<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetShopTeuz - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">

    <div class="logo">
      🐾 <span>PetShopTeuz</span>
    </div>

    <h2>Bem-vindo!</h2>
    <p>Cuide do seu melhor amigo com a gente ❤️</p>

    <div class="input-group">
      <input type="email" id="email" placeholder="Seu e-mail">
    </div>

    <div class="input-group senha-box">
      <input type="password" id="senha" placeholder="Sua senha">
      <span class="toggle" onclick="toggleSenha()">👁</span>
    </div>

    <a href="#" class="link">Esqueci minha senha</a>

    <button id="loginBtn">Entrar</button>

    <div class="register">
      Não tem conta? <a href="#">Criar agora</a>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
